<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Letter for Anvita</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffd6e8; /* soft pink */
        font-family: "Georgia", serif;
    }

    .container {
        position: relative;
        width: 350px;
        height: 250px;
        cursor: pointer;
    }

    /* Envelope base */
    .envelope {
        width: 100%;
        height: 100%;
        background: #ffb6d6;
        position: absolute;
        bottom: 0;
        border-radius: 6px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        overflow: hidden;
    }

    /* Envelope top flap */
    .flap {
        width: 0;
        height: 0;
        border-left: 175px solid transparent;
        border-right: 175px solid transparent;
        border-bottom: 120px solid #ff8fbd;
        position: absolute;
        top: 0;
        transform-origin: top;
        transition: transform 0.8s ease;
    }

    /* Letter inside */
    .letter {
        width: 90%;
        height: 90%;
        background: white;
        position: absolute;
        top: 40px;
        left: 5%;
        border-radius: 6px;
        padding: 20px;
        box-sizing: border-box;
        transform: translateY(120%);
        transition: transform 1s ease;
        overflow-y: auto;
    }

    /* When opened */
    .

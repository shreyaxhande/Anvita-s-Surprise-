<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anvita, from Shreya</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --pink-deep:#e8678a;
  --pink-dark:#c94070;
  --cream:#fffbfc;
}

body {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'DM Sans', sans-serif;
  background: linear-gradient(135deg,#ffe4ee,#ffd6e7,#fce8f3);
  overflow-x:hidden;
}

/* hearts */
.hearts-bg {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}
.heart-float {
  position:absolute;
  opacity:0.15;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  from { transform:translateY(110vh); }
  to { transform:translateY(-10vh); }
}

/* scene */
.scene {
  position:relative;
  z-index:1;
  width:100%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* envelope */
.envelope-wrap {
  width:320px;
  cursor:pointer;
  position:relative;
}

.envelope {
  width:100%;
  aspect-ratio:1.6/1;
  position:relative;
}

.env-body {
  position:absolute;
  inset:0;
  background:#f0849f;
  border-radius:6px;
}

.env-flap {
  position:absolute;
  top:0;
  width:100%;
  height:50%;
  background:#f9c8d8;
  clip-path: polygon(0 0, 50% 100%, 100% 0);
  transform-origin:top;
  transition:0.6s;
  z-index:5;
}

.envelope-wrap.open .env-flap {
  transform:rotateX(180deg);
}

.letter-peek {
  position:absolute;
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  height:50%;
  background:white;
  transition:0.6s;
  z-index:2;
}

.envelope-wrap.open .letter-peek {
  transform:translate(-50%,-60%);
}

/* letter */
.letter-container {
  margin-top:30px;
  opacity:0;
  transform:translateY(20px);
  transition:0.7s;
  pointer-events:none;
}

.letter-container.visible {
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.letter-paper {
  background:white;
  padding:40px;
  border-radius:4px;
}

/* image */
.photo-wrap {
  margin-top:30px;
  text-align:center;
}

.photo-wrap img {
  width:100%;
  max-width:320px;
  border-radius:6px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  display:block;
  margin:auto;
}
</style>
</head>

<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="scene">

  <!-- ENVELOPE -->
  <div class="envelope-wrap" id="envelopeWrap" onclick="openEnvelope()">
    <div class="envelope">
      <div class="env-body"></div>
      <div class="env-flap"></div>
      <div class="letter-peek"></div>
    </div>
  </div>

  <!-- LETTER -->
  <div class="letter-container" id="letterContainer">
    <div class="letter-paper">

      <h2>For Anvita</h2>
      <p>from Shreya ♥</p>

      <p style="margin-top:20px;">
        (put your letter text here)
      </p>

      <!-- IMAGE FIXED HERE -->
      <div class="photo-wrap">
        <img src="/mnt/data/9e820571-01d0-439f-b956-133598c652c9.png" alt="memory photo">
      </div>

    </div>
  </div>

</div>

<script>
function openEnvelope() {
  const wrap = document.getElementById("envelopeWrap");
  const letter = document.getElementById("letterContainer");

  wrap.classList.toggle("open");

  if (wrap.classList.contains("open")) {
    letter.classList.add("visible");
  } else {
    letter.classList.remove("visible");
  }
}

/* floating hearts */
const heartsBg = document.getElementById("heartsBg");
const hearts = ["♥","♡","❣"];

for (let i = 0; i < 25; i++) {
  const h = document.createElement("div");
  h.className = "heart-float";
  h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
  h.style.left = Math.random()*100 + "vw";
  h.style.animationDuration = (4 + Math.random()*5) + "s";
  h.style.fontSize = (12 + Math.random()*20) + "px";
  heartsBg.appendChild(h);
}
</script>

</body>
</html>

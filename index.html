<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Letter for Anvita</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" onclick="openLetter()">
    <div class="flap"></div>
    <div class="envelope"></div>

    <div class="letter">
      <h1>Dear Anvita,</h1>
      <p>Your full letter goes here.</p>
      <p>Love,<br>Shreya</p>
    </div>
  </div>

  <script>
    function openLetter() {
      document.querySelector(".container").classList.toggle("open");
    }
  </script>
</body>
</html>
